schema_version: 1
taxonomy_version: 0.33.1-classical-pilot-edge-upgrade
description: Conservative structured seed taxonomy for the Playlist Generator layered
  genre graph. Reviewed for schema consistency, fixture coverage, and conservative
  source-backed genre/facet policy; designed as sidecar/import input only.
enums:
  kind:
  - family
  - umbrella
  - genre
  - subgenre
  - microgenre
  - facet
  - alias
  - reject
  role:
  - family
  - umbrella
  - leaf
  - modifier
  - context
  - alias
  - reject
  status:
  - active
  - review
  - deprecated
  - alias_only
  - rejected
  facet_type:
  - mood
  - texture
  - instrumentation
  - production
  - era
  - region
  - function
  - vocal
  - scene
  - format
  - rhythm
  - null
  edge_type:
  - is_a
  - family_context
  - scene_adjacent
  - fusion_of
  - style_modifier
  - bridge_to
  - alias_of
  reject_reason:
  - label
  - artist_name
  - release_title
  - place
  - format
  - era
  - user_list
  - malformed
  - joke_tag
  - negative_tag
  - retail_bucket
  - source_noise
  - unknown_noise
  - null
policy_defaults:
  sidecar_only: true
  do_not_mutate_main_metadata_db: true
  broad_terms:
    observed_broad_evidence_bucket: accepted_broad_terms
    curated_parent_bucket: inferred_terms
    curated_family_bucket: inferred_family_terms
    do_not_duplicate_observed_and_inferred_without_distinct_provenance: true
    broad_only_admission:
      strict: reject
      narrow: reject_unless_exceptional_sonic_and_facet_support
      dynamic: allow_only_with_sonic_or_bridge_support
      discover: allow_with_sonic_or_facet_support
      'off': ignored
  token_containment:
    enabled: false
    notes: 'Never infer parent/family by string containment. Example: dream pop must
      not infer pop without an explicit curated edge.'
  metadata_quality_states:
    rich: At least two specific tags or one high-confidence niche tag.
    usable: One specific tag plus broad parent/family context.
    broad_only: Only broad tags such as rock/pop/indie/alternative/electronic.
    unknown: No trustworthy genre evidence.
    noisy: Descriptor/trivia/platform/user-list dominated.
  metadata_quality_by_mode:
    strict:
      rich: allow
      usable: limited
      broad_only: reject
      unknown: reject
      noisy: reject
    narrow:
      rich: allow
      usable: allow
      broad_only: rare_with_strong_support
      unknown: reject
      noisy: reject
    dynamic:
      rich: allow
      usable: allow
      broad_only: allow_with_sonic_facet_support
      unknown: maybe_with_sonic_support
      noisy: reject
    discover:
      rich: allow
      usable: allow
      broad_only: allow_with_support
      unknown: allow_with_strong_sonic_support
      noisy: reject
    'off':
      rich: ignore_genre
      usable: ignore_genre
      broad_only: ignore_genre
      unknown: ignore_genre
      noisy: ignore_genre
vector_outputs:
  X_genre_leaf_idf:
    includes_roles:
    - leaf
    excludes_kinds:
    - family
    - facet
    - alias
    - reject
    idf_weighted: true
    purpose: Specific genre/style/subgenre/microgenre precision.
  X_genre_family:
    includes_roles:
    - family
    includes_assignment_layers:
    - inferred_family
    - accepted_broad
    idf_weighted: false
    purpose: Broad neighborhood compatibility with lower weight.
  X_genre_bridge:
    source: genre_edges + genre_bridge_rules
    purpose: Cross-genre movement permissions and graph-derived adjacency.
  X_facet:
    includes_kinds:
    - facet
    purpose: Mood, texture, instrumentation, era, production, vocal, and function
      alignment.
  X_genre_legacy:
    optional: true
    purpose: Existing flat vector retained during migration/config fallback.
scoring_defaults:
  genre_score_formula: w_family * family_affinity + w_leaf * niche_similarity + w_facet
    * facet_alignment + w_bridge * bridge_permission - w_broad_only * broad_only_penalty
  edge_genre_score_formula: local_family_continuity + local_leaf_continuity + bridge_edge_bonus
    + facet_continuity - unexplained_family_jump_penalty
  weights_by_mode:
    strict:
      w_family: 0.15
      w_leaf: 0.65
      w_facet: 0.1
      w_bridge: 0.1
      w_broad_only: 0.4
    narrow:
      w_family: 0.25
      w_leaf: 0.5
      w_facet: 0.12
      w_bridge: 0.13
      w_broad_only: 0.3
    dynamic:
      w_family: 0.3
      w_leaf: 0.35
      w_facet: 0.17
      w_bridge: 0.18
      w_broad_only: 0.18
    discover:
      w_family: 0.3
      w_leaf: 0.25
      w_facet: 0.2
      w_bridge: 0.25
      w_broad_only: 0.08
    'off':
      w_family: 0.0
      w_leaf: 0.0
      w_facet: 0.0
      w_bridge: 0.0
      w_broad_only: 0.0
