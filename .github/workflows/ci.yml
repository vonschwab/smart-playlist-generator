name: CI

on:
  push:
    branches:
      - master
      - "release/**"
  pull_request:

# Cancel in-progress runs on the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev tooling
        # Lint and type-check don't need the full install; only the
        # static-analysis tools and their transitive deps. Skips the
        # heavy audio stack (librosa/scipy/etc).
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff mypy

      - name: Ruff
        run: ruff check src/ tests/ scripts/ tools/

      - name: Mypy (allowlisted modules)
        # The allowlist lives in pyproject.toml under [tool.mypy.overrides].
        # Mypy reads the config and only reports for those modules.
        run: mypy src/

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Qt runtime libraries
        # PySide6 imports QtGui during pytest-qt startup; Ubuntu runners do
        # not always include the EGL runtime library required by Qt wheels.
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1

      - name: Install package + dev/gui extras
        # GUI tests need PySide6 (the [gui] extra); pytest-qt + pytest-cov
        # come from [dev].
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[gui,dev]"

      - name: Run tests with coverage
        # --ignore tests/integration: integration tests need a real
        # artifact + DB and are not yet wired for CI. Tier-1.3 will
        # bring them online.
        # -ra prints a summary of all non-passing outcomes (including
        # xfail) so the 5 known-deferred tests stay visible.
        run: |
          pytest --ignore=tests/integration -ra --cov=src --cov-report=term --cov-report=xml

      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn
