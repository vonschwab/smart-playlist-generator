name: CI

on:
  push:
    branches:
      - master
      - "release/**"
  pull_request:

# Cancel in-progress runs on the same ref when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev tooling
        # Lint and type-check don't need the full install; only the
        # static-analysis tools and their transitive deps. Skips the
        # heavy audio stack (librosa/scipy/etc).
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff mypy

      - name: Ruff
        run: ruff check src/ tests/ scripts/ tools/

      - name: Mypy (allowlisted modules)
        # The allowlist lives in pyproject.toml under [tool.mypy.overrides].
        # Mypy reads the config and only reports for those modules.
        run: mypy src/

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[web,dev]"
      - name: Run tests with coverage
        # integration tests need a real artifact + DB; not wired for CI.
        run: |
          pytest --ignore=tests/integration -ra --cov=src --cov-report=term --cov-report=xml
      - name: Upload coverage XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

  build:
    name: Build wheel (packaging smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install frontend deps
        run: npm ci --prefix web
      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine
      - name: Build the distributable wheel (bundles the frontend)
        run: python scripts/build_wheel.py
      - name: Validate metadata + long description
        run: python -m twine check dist/*
