name: Publish to PyPI

on:
  release:
    types: [published]      # real PyPI publish when a GitHub Release is published
  workflow_dispatch:        # manual rehearsal
    inputs:
      target:
        description: "Publish target"
        type: choice
        options: [testpypi, pypi]
        default: testpypi

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build wheel and publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # OIDC / trusted publishing — no token needed
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install frontend deps
        run: npm ci --prefix web
      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine
      - name: Build the distributable wheel (bundles the frontend)
        run: python scripts/build_wheel.py
      - name: Validate metadata + long description
        run: python -m twine check dist/*
      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
      - name: Publish to PyPI
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
        uses: pypa/gh-action-pypi-publish@release/v1
